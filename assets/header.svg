<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="460" viewBox="0 0 1440 460" role="img" aria-labelledby="title desc">
  <title id="title">Douyin 底层算法逻辑分享</title>
  <desc id="desc">从一次普通午休下单，看见内容、算法与人性如何共同作用</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="0.48" stop-color="#172554"/>
      <stop offset="1" stop-color="#4c1d95"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#22d3ee"/>
      <stop offset="0.52" stop-color="#60a5fa"/>
      <stop offset="1" stop-color="#c084fc"/>
    </linearGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="42"/>
    </filter>
  </defs>
  <rect width="1440" height="460" rx="30" fill="url(#bg)"/>
  <circle cx="1220" cy="80" r="175" fill="#7c3aed" opacity=".28" filter="url(#blur)"/>
  <circle cx="180" cy="420" r="190" fill="#0891b2" opacity=".22" filter="url(#blur)"/>
  <path d="M0 350 C260 285 410 430 690 346 S1110 250 1440 345" fill="none" stroke="url(#accent)" stroke-width="2" opacity=".42"/>
  <path d="M0 390 C260 325 430 465 710 385 S1120 295 1440 380" fill="none" stroke="url(#accent)" stroke-width="1.2" opacity=".22"/>
  <g transform="translate(100 83)">
    <rect width="172" height="38" rx="19" fill="#ffffff" opacity=".10"/>
    <text x="86" y="25" text-anchor="middle" fill="#bae6fd" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700" letter-spacing="2">CASE STUDY</text>
    <text x="0" y="112" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="70" font-weight="800" letter-spacing="2">DOUYIN</text>
    <text x="0" y="178" fill="#e2e8f0" font-family="Inter, Noto Sans SC, PingFang SC, sans-serif" font-size="42" font-weight="700">底层算法逻辑分享</text>
    <text x="0" y="228" fill="#cbd5e1" font-family="Inter, Noto Sans SC, PingFang SC, sans-serif" font-size="22">从一次普通午休下单，看见内容、算法与人性如何共同作用</text>
    <g transform="translate(0 280)" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="600" letter-spacing="1.4">
