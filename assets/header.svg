      <circle cx="160" cy="-5" r="3" fill="#64748b"/>
      <text x="182" y="0" fill="#93c5fd">RECOMMENDATION</text>
      <circle cx="374" cy="-5" r="3" fill="#64748b"/>
      <text x="396" y="0" fill="#d8b4fe">HUMAN NATURE</text>
